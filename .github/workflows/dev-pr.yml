name: Dev CI

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  dev-pr-gate:
    name: Dev PR Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test

      - name: Build package
        run: make build
